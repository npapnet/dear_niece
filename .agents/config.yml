name: dear-niece
rules: rules.md
description: Greek university admission threshold prediction pipeline
architecture: ../architecture.md
skills_dir: skills/
workflows_dir: workflows/

environment:
  python: "3.13"
  package_manager: uv
  install: "uv sync"
  working_directory: ./  # all script paths are relative to repo root
  notes:
    - "All outputs (output/, data/_pipeline_cache/, weights/, profiles/*/analysis-*.xlsx, profiles/*/report-*.md) are gitignored and regenerated at runtime"
    - "Source data files (data/baseis-raw/*.xlsx, data/distributions.xlsx) must be present before any skill runs"
